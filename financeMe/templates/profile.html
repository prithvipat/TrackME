<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{username}} Account</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">    

</head>
<body>
    <div class='transactions_made'>
        <ul>
            <h2>Recent Purchases</h2> 
            {% for t in transactions %}
            <li><p>{{t.retailer}}: ${{t.amount}} - {{t.date}}</p></li>
            {% endfor %}
        </ul>
    </div>

    <div class='subscriptions_made'>
        <ul>
            <h2>Active Subscriptions</h2>
            {% for i in subscriptions %}
            <li><p>{{i.organization}} </p></li>
            {% endfor %}
        </ul>
    </div>

        <div class='pie-chart' id='container' style="width: 20%;">
            <canvas id='pie-chart'></canvas>
        </div>

        <div class='bar-chart-yearly'>
            <canvas id='yearly-bar-chart'></canvas>
        </div>
    </div>  

    <script> // Pie / Doughnut Chart
        var ctx = document.getElementById('pie-chart').getContext('2d');
        var dataValues = [
            {{categories.Food}},
            {{categories.Transportation}},
            {{categories.Clothing}},
            {{categories.Utilities}},
            {{categories.Vacation}},
            {{categories.Others}}
        ];
        
        var config = {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: dataValues,
                    backgroundColor: [
                        '#006769', '#40A578', '#9DDE8B', '#E6FF94', '#BEDC74', '#F6E96B'
                    ],
                    label: 'Expenses'
                }],
                labels: ['Food', 'Transportation', 'Clothing', 'Utilities', 'Vacation', 'Others']
            },
            options: {
                responsive: true
            }
        };
        

        new Chart(ctx, config);
    </script>

    <script> // Bar Chart
        var ctxYearly = document.getElementById('yearly-bar-chart').getContext('2d');
        
        var yearlyData = {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sept', 'Oct', 'Nov', 'Dec'],
            datasets: [{
                label: '{{year}} Spending',
                data: [
                    {{ yearly.Jan }},
                    {{ yearly.Feb }},
                    {{ yearly.Mar }},
                    {{ yearly.Apr }},
                    {{ yearly.May }},
                    {{ yearly.Jun }},
                    {{ yearly.Jul }},
                    {{ yearly.Aug }},
                    {{ yearly.Sept }},
                    {{ yearly.Oct }},
                    {{ yearly.Nov }},
                    {{ yearly.Dec }}
                ],
                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        };
    
        var configYearly = {
            type: 'bar',
            data: yearlyData,
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        };
    
        new Chart(ctxYearly, configYearly);
    </script>
    
</body>
</html>
